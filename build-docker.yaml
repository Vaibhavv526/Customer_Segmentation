name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t customer-segmentation .

      # 5. Push Docker image (optional)
      - name: Push Docker image
        run: |
          docker login -u vaibhav526 -p ${{ secrets.DOCKER_HUB_TOKEN}}
          docker tag customer-segmentation ${{ secrets.vaibhav526 }}/customer-segmentation:latest
          docker push ${{ secrets.vaibhav526 }}/customer-segmentation:latest